[package]
name = "diablo2-overlay"
version = "0.9.0"
description = "Transparent map overlay for Diablo 2 Resurrected"
authors = ["Blayne Chard"]
edition = "2021"

[lib]
name = "diablo2_overlay_lib"
crate-type = ["lib", "cdylib", "staticlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
